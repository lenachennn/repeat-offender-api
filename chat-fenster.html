<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chat-Radar</title>
<style>
  :root {
    --bg: #16181c; --panel: #1f2126; --text: #e4e6eb; --muted: #9aa0aa;
    --line: #2b2e34; --accent: #9147ff;
    --warn1: #f1c40f; --warn2: #e67e22; --warn3: #e74c3c; --repeat: #e74c3c;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
  header { background: var(--panel); border-bottom: 1px solid var(--line); padding: 10px 12px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  header input { background: var(--bg); border: 1px solid var(--line); color: var(--text); padding: 6px 8px; border-radius: 6px; font-size: 13px; }
  header input#channel { width: 150px; }
  header input#apibase { width: 200px; }
  header input#apikey { width: 150px; }
  header button { background: var(--accent); color: #fff; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }
  header button.off { background: #444; }
  #status { font-size: 12px; color: var(--muted); margin-left: auto; }
  #dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; background: #777; margin-right: 5px; vertical-align: middle; }
  #dot.on { background: #2ecc71; } #dot.err { background: #e74c3c; }
  #main { flex: 1; display: flex; min-height: 0; }
  #chat { flex: 1; overflow-y: auto; padding: 8px 10px; }
  #watchpanel { width: 170px; flex-shrink: 0; border-left: 1px solid var(--line); background: var(--panel); overflow-y: auto; padding: 6px; font-size: 12px; }
  #watchpanel .whead { font-weight: 700; color: var(--muted); padding: 2px 4px 6px; border-bottom: 1px solid var(--line); margin-bottom: 4px; }
  .wrow { display: flex; justify-content: space-between; gap: 6px; padding: 4px; border-radius: 4px; align-items: center; cursor: pointer; }
  .wrow .wname { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .wrow .wtime { flex-shrink: 0; font-variant-numeric: tabular-nums; }
  .wrow.active { background: rgba(231,76,60,.18); }
  .wrow.active .wtime { color: #ff6b6b; font-weight: 700; }
  .wrow.paused .wtime { color: #f1c40f; }
  .wrow.idle { opacity: .5; }
  .wrow.idle .wtime { color: var(--muted); }
  .msg { padding: 4px 8px; border-radius: 6px; margin-bottom: 2px; line-height: 1.4; border-left: 3px solid transparent; word-wrap: break-word; }
  .msg .name { font-weight: 700; }
  .msg .time { color: var(--muted); font-size: 11px; margin-right: 6px; }
  .msg.offender1 { border-left-color: var(--warn1); background: rgba(241,196,15,.06); }
  .msg.offender2 { border-left-color: var(--warn2); background: rgba(230,126,34,.08); }
  .msg.offender3 { border-left-color: #d35400; background: rgba(211,84,0,.10); }
  .msg.offender4 { border-left-color: var(--warn3); background: rgba(231,76,60,.12); }
  .msg.repeat { background: rgba(231,76,60,.18); border-left-color: var(--repeat); }
  /* "ganz rot": Wiederholung nach Timeout - staerkstes Signal */
  .msg.hot { background: #b71c1c; border-left-color: #ff1744; color: #fff; font-weight: 600; }
  .msg.hot .time { color: #ffcdd2; }
  .badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 1px 6px; border-radius: 10px; margin-left: 6px; vertical-align: middle; }
  .badge.off { background: var(--warn3); color: #fff; }
  .badge.rep { background: #3a3d44; color: #e4e6eb; }        /* Zaehler x2/x3 - neutral */
  .msg.repeat .badge.rep { background: #fff; color: var(--repeat); }  /* ab x4 - rot */
  .badge.hot { background: #fff; color: #b71c1c; }
  .tbadge { display: inline-block; font-size: 10px; font-weight: 700; color: #fff; padding: 1px 5px; border-radius: 4px; margin-right: 4px; vertical-align: middle; letter-spacing: .3px; }
  .tbadge-img { height: 18px; width: 18px; border-radius: 3px; margin-right: 3px; vertical-align: middle; }
  .sys { color: var(--muted); font-style: italic; padding: 4px 8px; font-size: 12px; }
  #legend { font-size: 11px; color: var(--muted); padding: 6px 12px; border-top: 1px solid var(--line); background: var(--panel); }
  .swatch { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin: 0 3px 0 10px; vertical-align: middle; }
</style>
</head>
<body>
  <header>
    <input id="channel" placeholder="Kanalname (z.B. lena)" autocomplete="off">
    <input id="apibase" placeholder="API-Adresse" autocomplete="off">
    <input id="apikey" placeholder="API-Key" autocomplete="off">
    <button id="toggle">Verbinden</button>
    <span id="status"><span id="dot"></span><span id="statustext">nicht verbunden</span></span>
  </header>
  <div id="main">
    <div id="chat"></div>
    <div id="watchpanel"></div>
  </div>
  <div id="legend">
    Markierungen:
    <span class="swatch" style="background:#f1c40f"></span>1 Timeout
    <span class="swatch" style="background:#e67e22"></span>2 Timeouts
    <span class="swatch" style="background:#d35400"></span>3 Timeouts
    <span class="swatch" style="background:#e74c3c"></span>4+ Timeouts
    <span class="swatch" style="background:#3a3d44"></span>Zaehler ab 2x (in 5min)
    <span class="swatch" style="background:#e74c3c"></span>gleiche Nachricht ab 4x rot
    <span class="swatch" style="background:#b71c1c"></span>Wiederholung nach Timeout (ganz rot, 5min)
  </div>

<script>
const REPEAT_WINDOW_MS = 5 * 60 * 1000;   // gleiche Nachricht kurz hintereinander
const REPEAT_MARK_FROM = 4;               // erst ab so vielen gleichen Nachrichten markieren
const HOT_WINDOW_MS = 5 * 60 * 1000;      // "ganz rot" bleibt so lange aktiv
const TIMEOUT_WATCH_MS = 15 * 60 * 1000;  // so lange nach Timeout auf Wiederholung achten
const COOLDOWN_MS = 5 * 60 * 1000;        // "im Visier"-Cooldown (rote Phase)
const $ = (id) => document.getElementById(id);

// Einstellungen merken
const cfg = JSON.parse(localStorage.getItem('chatradar') || '{}');
$('channel').value = cfg.channel || '';
$('apibase').value = cfg.apibase || 'http://185.249.225.83:8787';
$('apikey').value  = cfg.apikey  || 'rIJeTH7dHltBmYIdnkot3tk8KI79b5Bk';

// Twitch-Rollen als farbige Schildchen (Farben angelehnt an Twitch)
const BADGE_MAP = {
  broadcaster: { label: 'STREAM', bg: '#e91916' },
  moderator:   { label: 'MOD',    bg: '#00ad03' },
  vip:         { label: 'VIP',    bg: '#e005b9' },
  founder:     { label: 'FOUNDER', bg: '#9147ff' },
  subscriber:  { label: 'SUB',    bg: '#8205b4' },
  artist:      { label: 'ARTIST', bg: '#e005b9' },
  staff:       { label: 'STAFF',  bg: '#6441a5' },
  admin:       { label: 'ADMIN',  bg: '#6441a5' },
  global_mod:  { label: 'GMOD',   bg: '#00ad03' },
  partner:     { label: '✓',      bg: '#9147ff' },
};

function badgesHtml(badgesTag) {
  if (!badgesTag) return '';
  let out = '';
  for (const b of badgesTag.split(',')) {
    const set = b.split('/')[0];
    const url = badgeImages[b];
    if (url && url.startsWith('https://static-cdn.jtvnw.net/')) {
      // echtes Twitch-Bild
      out += `<img class="tbadge-img" src="${url}" alt="${escapeHtml(set)}" title="${escapeHtml(set)}">`;
    } else {
      // Rueckfall: farbiges Text-Schildchen
      const info = BADGE_MAP[set];
      if (info) out += `<span class="tbadge" style="background:${info.bg}">${info.label}</span>`;
    }
  }
  return out;
}

let ws = null, connected = false, channel = '';
let offenders = {};          // { username: {count} }  von der API
let badgeImages = {};        // { "set/version": bild-url }  von der API (echte Twitch-Abzeichen)
const lastMsg = new Map();   // username -> { text, time, count }
const timeouts = new Map();  // username -> { text, time }  zuletzt getimeoutet + damalige Nachricht
const hotUntil = new Map();  // username -> timestamp, bis wann "ganz rot"
const watch = new Map();     // username -> { name, count, cooldownUntil, timedOutUntil }  "im Visier"
let listTimer = null;

// Mods/Streamer/Staff zaehlen nicht mit
function isModLike(badgesTag) {
  if (!badgesTag) return false;
  return badgesTag.split(',').some((b) => ['broadcaster', 'moderator', 'staff', 'admin', 'global_mod'].includes(b.split('/')[0]));
}

function fmtTime(sec) { return Math.floor(sec / 60) + ':' + String(sec % 60).padStart(2, '0'); }

// Liste oben rechts aktualisieren (laeuft jede Sekunde)
function renderWatchPanel() {
  const now = Date.now();
  const panel = $('watchpanel');
  if (!panel) return;
  if (watch.size === 0) { panel.innerHTML = ''; return; }
  let html = `<div class="whead">Im Visier (${watch.size}) - Klick entfernt</div>`;
  for (const [key, w] of watch) {
    let status, cls;
    if (w.timedOutUntil > now) { status = '⏸ ' + fmtTime(Math.ceil((w.timedOutUntil - now) / 1000)); cls = 'paused'; }
    else if (w.cooldownUntil > now) { status = '⏳ ' + fmtTime(Math.ceil((w.cooldownUntil - now) / 1000)); cls = 'active'; }
    else { status = 'ruhig'; cls = 'idle'; }
    html += `<div class="wrow ${cls}" data-key="${escapeAttrText(key)}" title="${escapeHtml(w.name)} - ${w.count}x">` +
            `<span class="wname">${escapeHtml(w.name)}</span><span class="wtime">${status}</span></div>`;
  }
  panel.innerHTML = html;
}

function watchTick() {
  const now = Date.now();
  for (const w of watch.values()) {
    // Timeout abgelaufen -> Cooldown neu starten (5 min)
    if (w.timedOutUntil && now >= w.timedOutUntil) {
      w.cooldownUntil = w.timedOutUntil + COOLDOWN_MS;
      w.timedOutUntil = 0;
    }
  }
  renderWatchPanel();
}
setInterval(watchTick, 1000);

function escapeAttrText(s) { return String(s).replace(/[^a-z0-9_]/gi, ''); }

function setStatus(text, cls) {
  $('statustext').textContent = text;
  $('dot').className = cls || '';
}
function sys(text) {
  const d = document.createElement('div');
  d.className = 'sys'; d.textContent = text;
  $('chat').appendChild(d); scroll();
}
function scroll() {
  const c = $('chat');
  // Nur automatisch scrollen, wenn man ohnehin fast unten ist
  if (c.scrollHeight - c.scrollTop - c.clientHeight < 120) c.scrollTop = c.scrollHeight;
}

async function fetchOffenders() {
  const base = $('apibase').value.trim().replace(/\/$/, '');
  const key = $('apikey').value.trim();
  if (!base || !key || !channel) return;
  try {
    const res = await fetch(`${base}/list?key=${encodeURIComponent(key)}&chan=${encodeURIComponent(channel)}`);
    if (res.ok) offenders = await res.json();
  } catch (e) { /* API kurz nicht erreichbar - kein Drama */ }
}

async function fetchBadges() {
  const base = $('apibase').value.trim().replace(/\/$/, '');
  const key = $('apikey').value.trim();
  if (!base || !key || !channel) return;
  try {
    const res = await fetch(`${base}/badges?key=${encodeURIComponent(key)}&chan=${encodeURIComponent(channel)}`);
    if (res.ok) badgeImages = await res.json();
  } catch (e) { /* dann eben die Text-Schildchen als Rueckfall */ }
}

// --- Twitch IRC (anonym, nur lesen) ---
function connect() {
  channel = $('channel').value.trim().toLowerCase().replace(/^#/, '');
  if (!channel) { sys('⚠ Bitte zuerst oben einen Kanalnamen eingeben und dann erneut auf "Verbinden" klicken.'); return; }

  localStorage.setItem('chatradar', JSON.stringify({
    channel: $('channel').value.trim(), apibase: $('apibase').value.trim(), apikey: $('apikey').value.trim()
  }));

  setStatus('verbinde...', '');
  sys('Verbinde mit #' + channel + ' ...');
  ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');

  ws.onopen = () => {
    ws.send('CAP REQ :twitch.tv/tags twitch.tv/commands');
    ws.send('NICK justinfan' + Math.floor(Math.random() * 90000 + 10000));
    ws.send('JOIN #' + channel);
    connected = true;
    $('toggle').textContent = 'Trennen'; $('toggle').classList.add('off');
    setStatus('verbunden mit #' + channel, 'on');
    sys('✓ Verbunden mit #' + channel + '. Warte auf Nachrichten... (bei ruhigem Chat kann das dauern)');
    fetchOffenders();
    fetchBadges();
    listTimer = setInterval(fetchOffenders, 20000);
  };

  ws.onmessage = (ev) => {
    for (const line of ev.data.split('\r\n')) {
      if (!line) continue;
      if (line.startsWith('PING')) { ws.send('PONG :tmi.twitch.tv'); continue; }
      if (line.includes('CLEARCHAT')) { handleClearchat(line); continue; }
      const msg = parsePrivmsg(line);
      if (msg) render(msg);
    }
  };

  ws.onclose = () => {
    connected = false; clearInterval(listTimer);
    $('toggle').textContent = 'Verbinden'; $('toggle').classList.remove('off');
    setStatus('getrennt', '');
  };
  ws.onerror = () => setStatus('Verbindungsfehler', 'err');
}

function disconnect() { if (ws) ws.close(); }

function parsePrivmsg(line) {
  let tags = {};
  let rest = line;
  if (line.startsWith('@')) {
    const sp = line.indexOf(' ');
    for (const part of line.slice(1, sp).split(';')) {
      const [k, v] = part.split('=');
      tags[k] = v;
    }
    rest = line.slice(sp + 1);
  }
  if (!rest.includes('PRIVMSG')) return null;
  const userMatch = rest.match(/^:([^!]+)!/);
  const textMatch = rest.match(/PRIVMSG #[^ ]+ :(.*)$/);
  if (!userMatch || !textMatch) return null;
  return {
    user: userMatch[1],
    name: tags['display-name'] || userMatch[1],
    color: tags['color'] || '#bbbbbb',
    badges: tags['badges'] || '',
    text: textMatch[1],
  };
}

// Timeout/Ban aus dem Chat erkennen (Twitch sendet das mit)
function parseClearchat(line) {
  let tags = {}; let rest = line;
  if (line.startsWith('@')) {
    const sp = line.indexOf(' ');
    for (const part of line.slice(1, sp).split(';')) { const [k, v] = part.split('='); tags[k] = v; }
    rest = line.slice(sp + 1);
  }
  const m = rest.match(/CLEARCHAT #[^ ]+(?: :(.+))?$/);
  if (!m) return null;
  return { user: m[1] ? m[1].trim() : null, duration: tags['ban-duration'] ? Number(tags['ban-duration']) : null };
}

function handleClearchat(line) {
  const cc = parseClearchat(line);
  if (!cc || !cc.user) return; // ganzer Chat geleert -> ignorieren
  const key = cc.user.toLowerCase();
  const prev = lastMsg.get(key);
  if (cc.duration) {
    // Timeout: merken, welche Nachricht der Nutzer davor geschrieben hat
    timeouts.set(key, { text: prev ? prev.text : null, time: Date.now() });
    // Cooldown eines Nutzers im Visier pausieren (startet nach Timeout neu)
    const w = watch.get(key);
    if (w) { w.timedOutUntil = Date.now() + cc.duration * 1000; renderWatchPanel(); }
    sys('⏱ ' + cc.user + ' wurde getimeoutet (' + cc.duration + 's) - Cooldown pausiert.');
  } else {
    sys('⛔ ' + cc.user + ' wurde gebannt.');
  }
}

function render(m) {
  const key = m.user.toLowerCase();
  const now = Date.now();
  const norm = m.text.trim().toLowerCase();

  // Wiederholte Nachricht kurz hintereinander erkennen
  let repeat = false, repeatCount = 1;
  const prev = lastMsg.get(key);
  if (prev && prev.text === norm && now - prev.time < REPEAT_WINDOW_MS) {
    repeat = true; repeatCount = prev.count + 1;
  }

  // Wiederholung NACH einem Timeout? -> staerkstes Signal ("ganz rot")
  let afterTimeout = false;
  const to = timeouts.get(key);
  if (to) {
    if (now - to.time > TIMEOUT_WATCH_MS) {
      timeouts.delete(key); // zu lange her, nicht mehr beobachten
    } else if (to.text && to.text === norm) {
      afterTimeout = true;
      hotUntil.set(key, now + HOT_WINDOW_MS); // 5 min lang "ganz rot"
      timeouts.delete(key);
    }
  }
  const hot = afterTimeout || (hotUntil.get(key) || 0) > now;
  const mod = isModLike(m.badges);       // Mods zaehlen nicht mit
  const showCount = repeat && !mod;      // Zaehler x2/x3 nur bei Nicht-Mods

  // Ins "Visier" aufnehmen, sobald 4x dieselbe Nachricht (nur Nicht-Mods)
  if (!mod && repeat && repeatCount >= REPEAT_MARK_FROM) {
    let w = watch.get(key);
    if (!w) { w = { name: m.name, count: 0, cooldownUntil: 0, timedOutUntil: 0 }; watch.set(key, w); }
    w.name = m.name;
    w.count = repeatCount;
    if (!(w.timedOutUntil > now)) w.cooldownUntil = now + COOLDOWN_MS; // waehrend Timeout nicht verlaengern
    renderWatchPanel();
  }
  const w = watch.get(key);
  const active = !!w && !mod && !(w.timedOutUntil > now) && w.cooldownUntil > now; // rote Phase

  lastMsg.set(key, { text: norm, time: now, count: repeat ? repeatCount : 1 });

  const div = document.createElement('div');
  div.className = 'msg';

  // Wiederholungstaeter aus der API (rot erst ab 4)
  const off = offenders[key];
  if (off && off.count >= 1) {
    div.classList.add('offender' + Math.min(off.count, 4));
  }
  if (active && !hot) div.classList.add('repeat'); // rot nur waehrend Cooldown
  if (hot) div.classList.add('hot'); // ueberschreibt die anderen Farben

  const t = new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
  let html = `<span class="time">${t}</span>`;
  html += badgesHtml(m.badges);
  html += `<span class="name" style="color:${escapeAttr(m.color)}">${escapeHtml(m.name)}</span>`;
  if (hot) html += `<span class="badge hot">⛔ Wiederholt nach Timeout</span>`;
  if (off && off.count >= 1) html += `<span class="badge off">⚠ ${off.count}x Timeout</span>`;
  if (showCount && !hot) html += `<span class="badge rep">x${repeatCount}</span>`;
  html += ': ' + escapeHtml(m.text);
  div.innerHTML = html;

  $('chat').appendChild(div);
  // Alte Nachrichten begrenzen
  const chat = $('chat');
  while (chat.childElementCount > 400) chat.removeChild(chat.firstChild);
  scroll();
}

function escapeHtml(s) { return s.replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s) { return /^#[0-9a-fA-F]{6}$/.test(s) ? s : '#bbbbbb'; }

// Klick auf einen Eintrag im Visier entfernt ihn
$('watchpanel').addEventListener('click', (e) => {
  const row = e.target.closest('.wrow');
  if (row && row.dataset.key) { watch.delete(row.dataset.key); renderWatchPanel(); }
});

$('toggle').addEventListener('click', () => connected ? disconnect() : connect());
sys('Kanalnamen eingeben und auf "Verbinden" klicken. Nur-Lese-Modus, kein Login noetig.');
</script>
</body>
</html>
